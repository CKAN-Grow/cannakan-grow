<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Single germinating seed hero illustration">
  <defs>
    <radialGradient id="heroCoreGlow" cx="50%" cy="44%" r="34%">
      <stop offset="0%" stop-color="#c6f78e" stop-opacity="0.36"/>
      <stop offset="42%" stop-color="#94d159" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#94d159" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroBaseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccff7b" stop-opacity="0.42"/>
      <stop offset="28%" stop-color="#94d159" stop-opacity="0.18"/>
      <stop offset="72%" stop-color="#94d159" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#94d159" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seedShellOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7e486"/>
      <stop offset="42%" stop-color="#b0882d"/>
      <stop offset="100%" stop-color="#433013"/>
    </linearGradient>
    <linearGradient id="seedShellInner" x1="8%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0a8"/>
      <stop offset="38%" stop-color="#d1b152"/>
      <stop offset="100%" stop-color="#5f4618"/>
    </linearGradient>
    <linearGradient id="taprootFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#efffbf"/>
      <stop offset="38%" stop-color="#d8ff8c"/>
      <stop offset="74%" stop-color="#98d85a"/>
      <stop offset="100%" stop-color="#5d8d2f"/>
