<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">CSTP Verified Gold Badge</title>
  <desc id="desc">Gold CSTP verified certification badge with CK mark.</desc>
  <defs>
    <radialGradient id="goldOuter" cx="34%" cy="24%" r="72%">
      <stop offset="0%" stop-color="#fff1a8"/>
      <stop offset="22%" stop-color="#ffd95a"/>
      <stop offset="58%" stop-color="#cf9626"/>
      <stop offset="100%" stop-color="#845413"/>
    </radialGradient>
    <radialGradient id="goldInner" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffe68c"/>
      <stop offset="26%" stop-color="#e0ad2d"/>
      <stop offset="72%" stop-color="#8f6218"/>
      <stop offset="100%" stop-color="#5f3f10"/>
    </radialGradient>
    <linearGradient id="goldBevel" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3ad"/>
      <stop offset="30%" stop-color="#efbf3d"/>
      <stop offset="70%" stop-color="#b77d1f"/>
      <stop offset="100%" stop-color="#f9d86d"/>
    </linearGradient>
    <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <path id="topArcGold" d="M 108 256 A 148 148 0 0 1 404 256" />
    <path id="bottomArcGold" d="M 404 256 A 148 148 0 0 1 108 256" />
  </defs>
  <g filter="url(#goldShadow)">
    <circle cx="256" cy="256" r="224" fill="url(#goldOuter)"/>
    <circle cx="256" cy="256" r="214" fill="none" stroke="#6e430e" stroke-width="4" opacity="0.42"/>
    <circle cx="256" cy="256" r="185" fill="#111111" opacity="0.9"/>
    <circle cx="256" cy="256" r="176" fill="url(#goldBevel)"/>
    <circle cx="256" cy="256" r="160" fill="#16110a"/>
    <circle cx="256" cy="256" r="150" fill="url(#goldInner)"/>
    <circle cx="256" cy="256" r="147" fill="none" stroke="#f8d870" stroke-width="2.5" opacity="0.7"/>
    <circle cx="109" cy="256" r="10" fill="#17120a"/>
    <circle cx="403" cy="256" r="10" fill="#17120a"/>
    <text font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800" letter-spacing="2.6" fill="#14100b">
      <textPath href="#topArcGold" startOffset="50%" text-anchor="middle">CSTP VERIFIED</textPath>
    </text>
    <text font-family="Arial, Helvetica, sans-serif" font-size="33" font-weight="800" letter-spacing="3.2" fill="#14100b">
      <textPath href="#bottomArcGold" startOffset="50%" text-anchor="middle">GOLD</textPath>
    </text>
    <g transform="translate(256 271)">
      <text x="0" y="0" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="156" font-weight="900" fill="#f8d763" stroke="#7e5312" stroke-width="6">ck</text>
      <g transform="translate(0 72)" fill="none" stroke="#f3cf57" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 22 C0 -6 0 -34 0 -56"/>
        <path d="M0 14 C-12 -4 -35 -16 -58 -18 C-56 8 -44 28 -18 42"/>
        <path d="M0 14 C12 -4 35 -16 58 -18 C56 8 44 28 18 42"/>
      </g>
    </g>
    <path d="M53 224 C65 136 134 67 224 53" fill="none" stroke="#fff3b4" stroke-width="10" stroke-linecap="round" opacity="0.42"/>
  </g>
</svg>
