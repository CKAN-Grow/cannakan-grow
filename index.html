<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannakan Grow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Grow Session Tracker</p>
        <h1>Cannakan Grow</h1>
      </div>
      <nav class="topbar-nav" aria-label="Primary">
        <a href="#home">Home</a>
        <a href="#sessions">Sessions</a>
        <a href="#gallery">Grow Gallery</a>
        <a href="#admin/gallery-moderation" data-admin-nav hidden>Moderation</a>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </header>

    <main id="app" class="app-main"></main>
  </div>

  <template id="auth-template">
    <section class="card auth-card">
      <div>
        <p class="eyebrow">Secure Access</p>
        <h2>Sign in to your grow sessions</h2>
        <p class="muted">Use your email and password to save and manage sessions across devices.</p>
      </div>
      <form id="auth-form" class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter password" minlength="6" required>
        </label>
        <label id="confirm-password-field" class="auth-confirm-field" hidden>
          <span>Confirm Password</span>
          <input type="password" name="confirmPassword" placeholder="Confirm password" minlength="6">
        </label>
        <p id="auth-message" class="form-message" role="alert" aria-live="polite"></p>
        <div class="form-actions">
          <button type="submit" name="action" value="login" class="button button-primary">Log In</button>
          <button type="submit" name="action" value="signup" class="button button-secondary">Sign Up</button>
        </div>
      </form>
    </section>
  </template>

  <template id="setup-template">
    <section class="card auth-card">
      <div>
        <p class="eyebrow">Supabase Setup</p>
        <h2>Connect cloud auth and storage</h2>
        <p class="muted">Add your Supabase project URL and publishable anon key, then run the provided SQL schema so Cannakan Grow can save sessions securely for each user.</p>
      </div>
      <div class="setup-list">
        <p><strong>1.</strong> For Vercel, set <code>CANNAKAN_SUPABASE_URL</code> and <code>CANNAKAN_SUPABASE_ANON_KEY</code>. For local testing, generate or update <code>supabase-config.js</code>.</p>
        <p><strong>2.</strong> Run <code>supabase-schema.sql</code> in the Supabase SQL editor to create the session table and image storage policies.</p>
        <p><strong>3.</strong> Enable Email auth in your Supabase project.</p>
      </div>
    </section>
  </template>

  <template id="profile-template">
    <section class="card auth-card profile-card">
      <div>
        <p id="profile-eyebrow" class="eyebrow">Profile Setup</p>
        <h2 id="profile-title">Set up your profile</h2>
        <p id="profile-copy" class="muted">Choose the username you want Cannakan Grow to show in the app.</p>
      </div>
      <form id="profile-form" class="auth-form profile-form">
        <label>
          <span>Username / Display Name</span>
          <input type="text" name="username" placeholder="Choose a display name" maxlength="40" required>
        </label>
        <label class="profile-avatar-field">
          <span>Profile Picture (optional)</span>
          <span class="file-upload-control">
            <span class="file-upload-button">Choose Image</span>
            <span class="file-upload-name">No file selected</span>
            <input class="file-upload-input" type="file" name="avatar" accept="image/*">
          </span>
        </label>
        <div id="profile-avatar-preview" class="profile-avatar-preview" hidden></div>
        <div class="profile-avatar-actions">
          <button id="profile-remove-avatar" type="button" class="button button-secondary" hidden>Remove Picture</button>
        </div>
        <p id="profile-message" class="form-message" role="alert" aria-live="polite"></p>
        <div class="form-actions">
          <button id="profile-submit" type="submit" class="button button-primary">Save Profile</button>
        </div>
        <section class="profile-danger-zone" aria-labelledby="profile-danger-title">
          <div>
            <p class="eyebrow">Danger Zone</p>
            <h3 id="profile-danger-title">Delete Account</h3>
            <p class="muted">Schedule deletion of your Cannakan Grow profile, sessions, and uploaded images with a 7-day recovery window.</p>
          </div>
          <button id="profile-delete-account" type="button" class="button button-danger">Delete Account</button>
        </section>
      </form>
    </section>
  </template>

  <template id="home-template">
    <section class="dashboard-bar card">
      <div>
        <p class="eyebrow">Session Dashboard</p>
        <h2>Grow sessions</h2>
        <p class="dashboard-subtitle">Track what is active, what is performing best, and what needs your attention next.</p>
      </div>
      <div class="hero-actions">
        <a class="button button-primary" href="#new">New Session</a>
        <a class="button button-secondary" href="#sessions">All Sessions</a>
      </div>
    </section>

    <section id="active-session-spotlight" class="card spotlight-card" aria-labelledby="active-session-spotlight-title">
      <div class="spotlight-head">
        <div>
          <p class="eyebrow">Active Session</p>
          <h3 id="active-session-spotlight-title">Active Session Spotlight</h3>
        </div>
        <span id="active-session-spotlight-stage" class="spotlight-stage-pill">Soaking</span>
      </div>
      <div class="spotlight-body">
        <div class="spotlight-main">
          <strong id="active-session-spotlight-name" class="spotlight-name">No active sessions</strong>
          <p id="active-session-spotlight-date" class="spotlight-date"></p>
          <p id="active-session-spotlight-description" class="spotlight-description"></p>
          <div class="spotlight-meta">
            <article class="spotlight-stat">
              <span>Stage Timer</span>
              <strong id="active-session-spotlight-timer">0 minutes</strong>
            </article>
            <article class="spotlight-stat">
              <span>Seeds Progress</span>
              <strong id="active-session-spotlight-seeds">0 / 0</strong>
            </article>
            <article class="spotlight-stat">
              <span>Germination</span>
              <strong id="active-session-spotlight-rate">0%</strong>
            </article>
          </div>
        </div>
        <div class="spotlight-actions">
          <a id="active-session-spotlight-action" class="button button-primary" href="#new">Start New Session</a>
        </div>
      </div>
    </section>

    <section class="summary-grid">
      <a id="active-sessions-card" class="card stat-card summary-link-card" href="#sessions">
        <span class="stat-label">Active Sessions</span>
        <strong id="active-session-count" class="stat-value">0</strong>
        <p id="active-session-subtext" class="summary-subtext">in progress</p>
      </a>
      <a class="card stat-card summary-link-card" href="#sessions">
        <span class="stat-label">Saved Sessions</span>
        <strong id="session-count" class="stat-value">0</strong>
        <p class="summary-subtext">total saved</p>
      </a>
      <a id="best-session-card" class="card stat-card best-session-card summary-link-card" href="#sessions">
        <div class="best-session-header">
          <span class="stat-label">Best Session</span>
          <span class="best-session-indicator">Best</span>
        </div>
        <strong id="best-session-name" class="best-session-name">No completed sessions yet</strong>
        <p id="best-session-date" class="summary-subtext"></p>
        <p id="best-session-result" class="best-session-result"></p>
      </a>
      <article class="card stat-card overall-rate-card">
        <span class="stat-label">All Sessions Germination Rate</span>
        <strong id="overall-germination-rate" class="overall-rate-value">0%</strong>
        <p id="overall-germination-total" class="overall-rate-total">0 / 0 seeds</p>
        <div class="overall-rate-bar" aria-label="Overall germination rate">
          <div id="overall-germination-fill" class="overall-rate-fill"></div>
        </div>
      </article>
    </section>
  </template>

  <template id="gallery-template">
    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Grow Gallery</p>
          <h2>Grow Gallery</h2>
          <p class="muted">Explore shared grow sessions from the community</p>
        </div>
      </div>
    </section>

    <section class="card gallery-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Published Snapshots</p>
          <h3>Community Grow Gallery</h3>
        </div>
      </div>
      <div id="gallery-grid" class="gallery-grid"></div>
    </section>
  </template>

  <template id="gallery-review-template">
    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Admin</p>
          <h2>Gallery Moderation</h2>
          <p class="muted">Review submitted grow snapshots before they appear in the Grow Gallery.</p>
        </div>
      </div>
    </section>

    <section class="card gallery-review-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Pending Review</p>
          <h3>Submitted Snapshots</h3>
        </div>
      </div>
      <div id="gallery-review-pending-list" class="gallery-review-list"></div>
    </section>

    <section class="card gallery-review-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Approved</p>
          <h3>Published Snapshots</h3>
        </div>
      </div>
      <div id="gallery-review-approved-list" class="gallery-review-list"></div>
    </section>
  </template>

  <template id="session-form-template">
    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">New Session</p>
          <h2>Create a grow session</h2>
        </div>
      </div>

      <form id="session-form" class="session-form">
        <section class="session-overview-panel">
          <section class="session-top-grid">
            <div class="session-chart-header">
              <label>
                <span>Session Name</span>
                <input type="text" name="sessionName" placeholder="Ex: Blue Dream test - Seedsman" maxlength="80">
              </label>
              <label>
                <span>Date</span>
                <input type="date" name="date" required>
              </label>
              <label class="time-format-field">
                <div class="field-label-row">
                  <span>Time</span>
                  <div class="time-format-toggle" role="group" aria-label="Time format">
                    <button type="button" class="time-format-button" data-time-format="12h">12h</button>
                    <button type="button" class="time-format-button" data-time-format="24h">24h</button>
                  </div>
                </div>
                <input type="hidden" name="time">
                <input type="text" name="timeDisplay" inputmode="numeric" autocomplete="off" required>
              </label>
              <label>
                <span>System Type</span>
                <select name="systemType" required>
                  <option value="KAN">KAN</option>
                  <option value="TRA">TRA</option>
                </select>
              </label>
              <label>
                <span>System ID (if using multiple)</span>
                <input type="text" name="unitId" placeholder="Ex: A, B, C" maxlength="12">
              </label>
            </div>
          </section>

          <section class="system-layout-block" aria-labelledby="system-layout-label">
            <p id="system-layout-label" class="system-layout-label">System Layout</p>
            <div id="system-layout-reference" class="system-layout-visual"></div>
          </section>

          <section id="session-lifecycle-section" class="session-lifecycle-section" aria-labelledby="session-lifecycle-title">
            <div class="progress-chart-heading">
              <p class="eyebrow">Timeline</p>
              <h4 id="session-lifecycle-title">Session Progress</h4>
            </div>
            <div id="session-lifecycle-summary" class="session-lifecycle-summary"></div>
            <details class="timeline-debug-panel">
              <summary>Timeline Debug Tools</summary>
              <div class="timeline-debug-actions">
                <button type="button" class="button button-secondary" data-debug-event="germination">Set Germination Now</button>
                <button type="button" class="button button-secondary" data-debug-event="first-planted">Set First Germinated Now</button>
                <button type="button" class="button button-secondary" data-debug-event="completed">Set Completed Now</button>
                <button type="button" class="button button-secondary" data-debug-event="reset">Reset Debug Timeline</button>
              </div>
            </details>
          </section>
        </section>

        <section class="partitions-panel">
          <div class="partition-work-header">
            <div class="partition-work-heading">
              <p class="eyebrow">Partitions</p>
              <h3 id="partition-work-title">KAN® Partition Chart</h3>
            </div>
            <div class="session-status-panel">
              <p class="session-status-label">Current Stage</p>
              <div class="session-status-card">
                <div class="session-status-top">
                  <div class="session-status-current">
                    <strong class="session-status-current-value">Not Started</strong>
                  </div>
                  <input type="hidden" id="session-status-control" name="sessionStatus" value="">
                  <button type="button" id="session-status-trigger" class="session-status-trigger">Select Growth Stage</button>
                </div>
                <p class="session-status-help">Update the stage as your seeds progress through the session.</p>
                <p id="session-status-error" class="session-status-error" aria-live="polite"></p>
              </div>
            </div>
          </div>
          <p id="session-status-reminder" class="session-status-reminder" aria-live="polite"></p>
          <p id="form-message" class="form-message" role="alert" aria-live="polite"></p>
          <div id="partition-chart-shell" class="chart-shell">
            <div id="partition-chart-header" class="chart-header chart-row">
              <span>Partition</span>
              <span>Seed Variety</span>
              <span>Type</span>
              <span>Sex</span>
              <span># of Seeds</span>
              <span># Germinated</span>
              <span>Success %</span>
            </div>
            <div id="partition-fields" class="partition-table"></div>
          </div>
          <div class="timeline-save-shortcut">
            <p class="timeline-save-shortcut-text">Review your progress and save your session</p>
            <button type="submit" class="button button-primary">Save Session</button>
          </div>
          <section id="session-timing-section" class="session-timing-section" aria-labelledby="session-timing-title">
            <div class="progress-chart-heading">
              <p class="eyebrow">Timing</p>
              <h4 id="session-timing-title">Session duration</h4>
            </div>
            <div id="session-timing-summary" class="session-timing-summary"></div>
          </section>
          <section id="partition-progress-section" class="progress-chart-section" aria-labelledby="partition-progress-title">
            <div class="progress-chart-heading">
              <p class="eyebrow">Progress</p>
              <h4 id="partition-progress-title">Germination progress by partition</h4>
            </div>
            <div id="partition-progress-chart" class="progress-chart-list"></div>
          </section>
          <section id="run-progress-section" class="run-progress-section" aria-labelledby="run-progress-title">
            <div class="progress-chart-heading">
              <p class="eyebrow">Germination Rate</p>
              <h4 id="run-progress-title">Overall Session Germination %</h4>
            </div>
            <div id="run-progress-summary" class="run-progress-summary"></div>
          </section>
          <section class="session-notes-section" aria-labelledby="session-notes-label">
            <label class="session-notes-field" for="session-notes">
              <span id="session-notes-label">Session Notes</span>
              <textarea
                id="session-notes"
                name="sessionNotes"
                rows="5"
                placeholder="Add notes about this run (soak time, conditions, observations...)"
              ></textarea>
            </label>
            <p class="session-notes-help">Notes help you understand results later.</p>
          </section>
          <section class="session-images-section" aria-labelledby="session-images-label">
            <div class="session-images-heading">
              <div>
                <p class="eyebrow">Images</p>
                <h4 id="session-images-label">Session Images</h4>
              </div>
              <span class="session-images-limit">Up to 3 images</span>
            </div>
            <label class="session-images-upload">
              <span>Add images</span>
              <span class="file-upload-control">
                <span class="file-upload-button">Choose Image</span>
                <span class="file-upload-name">No file selected</span>
                <input id="session-images-input" class="file-upload-input" type="file" accept="image/*" multiple>
              </span>
            </label>
            <p id="session-images-message" class="session-images-message" aria-live="polite"></p>
            <div id="session-images-grid" class="session-images-grid"></div>
          </section>
          <section id="share-snapshot-section" class="share-snapshot-section" aria-labelledby="share-snapshot-title">
            <div class="snapshot-hero">
              <div class="snapshot-social-icon snapshot-social-icon--hero" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M12 16V4"></path>
                  <path d="M7.5 8.5L12 4l4.5 4.5"></path>
                  <path d="M6 13.5v3.25A2.25 2.25 0 0 0 8.25 19h7.5A2.25 2.25 0 0 0 18 16.75V13.5"></path>
                </svg>
              </div>
              <div class="snapshot-hero-copy">
                <div class="progress-chart-heading">
                  <p class="eyebrow">Share</p>
                  <h4 id="share-snapshot-title">Share Your Grow Snapshot</h4>
                </div>
                <p class="snapshot-help">Turn your session into a shareable snapshot</p>
              </div>
            </div>
          <div id="snapshot-image-picker" class="snapshot-source-summary"></div>
          <div class="snapshot-gallery-controls">
            <p class="snapshot-destination-label">Share to</p>
            <div class="snapshot-destination-group" role="radiogroup" aria-label="Snapshot share destination">
              <label class="snapshot-destination-option">
                <input id="snapshot-destination-social" type="radio" name="snapshot-destination" value="social" checked>
                <span>Social only</span>
              </label>
              <label class="snapshot-destination-option">
                <input id="snapshot-destination-social-gallery" type="radio" name="snapshot-destination" value="social-gallery">
                <span>Social + Grow Gallery</span>
              </label>
              <label class="snapshot-destination-option">
                <input id="snapshot-destination-gallery" type="radio" name="snapshot-destination" value="gallery">
                <span>Grow Gallery only</span>
              </label>
            </div>
            <p class="snapshot-destination-info">Grow Gallery snapshots must be approved before being published.</p>
            <p id="snapshot-gallery-note" class="snapshot-gallery-note">Snapshots stay private by default. Save this session before publishing publicly. Private notes stay private.</p>
            <div class="snapshot-gallery-actions">
              <a class="button button-secondary snapshot-gallery-link" href="#gallery">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M7 17 17 7"></path>
                  <path d="M9 7h8v8"></path>
                </svg>
                <span>Visit Grow Gallery</span>
              </a>
              <button id="snapshot-unpublish" type="button" class="button button-secondary snapshot-gallery-unpublish" hidden>Remove from Gallery</button>
            </div>
          </div>
          <p id="snapshot-message" class="snapshot-message" aria-live="polite"></p>
            <div class="snapshot-actions">
              <button id="generate-snapshot" type="button" class="button button-secondary">Generate Snapshot</button>
              <button id="download-snapshot" type="button" class="button button-secondary" disabled>Download Image</button>
              <button id="reset-snapshot" type="button" class="button button-secondary" disabled>Create New Snapshot</button>
              <button id="share-snapshot" type="button" class="button button-primary snapshot-share-button" disabled>
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M12 16V4"></path>
                  <path d="M7.5 8.5L12 4l4.5 4.5"></path>
                  <path d="M6 13.5v3.25A2.25 2.25 0 0 0 8.25 19h7.5A2.25 2.25 0 0 0 18 16.75V13.5"></path>
                </svg>
                <span>Share</span>
              </button>
            </div>
            <div id="snapshot-preview" class="snapshot-preview" hidden></div>
          </section>
        </section>

        <p id="session-success-summary" class="session-success-summary" aria-live="polite"></p>

        <div class="form-actions">
          <button type="submit" class="button button-primary">Save Session</button>
          <a class="button button-secondary" href="#sessions">Cancel</a>
        </div>
      </form>
    </section>
  </template>

  <template id="sessions-template">
    <section id="grow-sessions-header" class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Grow Sessions</p>
          <h2>Create a New Session</h2>
        </div>
        <a class="button button-primary" href="#new">New Session</a>
      </div>
    </section>

    <section id="active-sessions-section" class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Active Sessions</p>
          <h3>Active Sessions</h3>
        </div>
      </div>
      <div id="active-sessions-list" class="sessions-list"></div>
    </section>

    <section id="recent-completed-sessions-section" class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Recent Completed Sessions</p>
          <h3>Recent Completed Sessions</h3>
        </div>
      </div>
      <div id="recent-completed-sessions-list" class="recent-sessions-grid"></div>
    </section>

    <section id="session-history-section" class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Session History</p>
          <h3>Session History</h3>
        </div>
      </div>
      <div id="sessions-list" class="sessions-list"></div>
    </section>
  </template>

  <template id="session-detail-template">
    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Session Detail</p>
          <h2 id="detail-title">Session</h2>
        </div>
        <div class="inline-actions">
          <a class="button button-secondary" href="#sessions">Back</a>
          <button id="delete-session" class="button button-danger" type="button">Delete</button>
        </div>
      </div>

      <section class="session-overview-panel">
        <section class="session-top-grid detail-top-grid">
          <section id="detail-meta" class="session-chart-header detail-header"></section>
        </section>
        <section class="system-layout-block" aria-labelledby="detail-system-layout-label">
          <p id="detail-system-layout-label" class="system-layout-label">System Layout</p>
          <div id="detail-layout-reference" class="system-layout-visual"></div>
        </section>
        <section id="detail-lifecycle-section" class="session-lifecycle-section" aria-labelledby="detail-lifecycle-title">
          <div class="progress-chart-heading">
            <p class="eyebrow">Timeline</p>
            <h4 id="detail-lifecycle-title">Session Progress</h4>
          </div>
          <div id="detail-lifecycle-summary" class="session-lifecycle-summary"></div>
          <details class="timeline-debug-panel">
            <summary>Timeline Debug Tools</summary>
            <div class="timeline-debug-actions">
              <button type="button" class="button button-secondary" data-debug-event="germination">Set Germination Now</button>
              <button type="button" class="button button-secondary" data-debug-event="first-planted">Set First Germinated Now</button>
              <button type="button" class="button button-secondary" data-debug-event="completed">Set Completed Now</button>
              <button type="button" class="button button-secondary" data-debug-event="reset">Reset Debug Timeline</button>
            </div>
          </details>
        </section>
      </section>
      <section>
        <div class="partition-work-header">
          <div class="partition-work-heading">
            <p class="eyebrow">Partitions</p>
            <h3 id="detail-partition-work-title">KAN® Partition Chart</h3>
          </div>
          <div class="session-status-panel">
            <p class="session-status-label">Current Stage</p>
            <div class="session-status-card">
              <div class="session-status-top">
                <div class="session-status-current">
                  <strong class="session-status-current-value">Not Started</strong>
                </div>
                <input type="hidden" id="detail-session-status-control" value="">
                <button type="button" id="detail-session-status-trigger" class="session-status-trigger">Select Growth Stage</button>
              </div>
              <p class="session-status-help">Update the stage as your seeds progress through the session.</p>
            </div>
          </div>
        </div>
        <p id="detail-session-status-reminder" class="session-status-reminder" aria-live="polite"></p>
        <div id="detail-chart-shell" class="chart-shell">
          <div id="detail-chart-header" class="chart-header chart-row">
            <span>Partition</span>
            <span>Seed Variety</span>
            <span>Type</span>
            <span>Sex</span>
            <span># of Seeds</span>
            <span># Germinated</span>
            <span>Success %</span>
          </div>
          <div id="detail-partitions" class="partition-table"></div>
        </div>
        <div class="timeline-save-shortcut">
          <p class="timeline-save-shortcut-text">Review your progress and save your session</p>
          <button id="detail-save-shortcut" type="button" class="button button-primary">Save Session</button>
        </div>
        <section id="detail-timing-section" class="session-timing-section" aria-labelledby="detail-timing-title">
          <div class="progress-chart-heading">
            <p class="eyebrow">Timing</p>
            <h4 id="detail-timing-title">Session duration</h4>
          </div>
          <div id="detail-timing-summary" class="session-timing-summary"></div>
        </section>
        <section id="detail-progress-section" class="progress-chart-section" aria-labelledby="detail-progress-title">
          <div class="progress-chart-heading">
            <p class="eyebrow">Progress</p>
            <h4 id="detail-progress-title">Germination progress by partition</h4>
          </div>
          <div id="detail-progress-chart" class="progress-chart-list"></div>
        </section>
        <section id="detail-run-progress-section" class="run-progress-section" aria-labelledby="detail-run-progress-title">
          <div class="progress-chart-heading">
            <p class="eyebrow">Germination Rate</p>
            <h4 id="detail-run-progress-title">Overall Session Germination %</h4>
          </div>
          <div id="detail-run-progress-summary" class="run-progress-summary"></div>
        </section>
        <section class="session-notes-section" aria-labelledby="detail-session-notes-label">
          <label class="session-notes-field" for="detail-session-notes">
            <span id="detail-session-notes-label">Session Notes</span>
            <textarea
              id="detail-session-notes"
              rows="5"
              placeholder="Add notes about this run (soak time, conditions, observations...)"
            ></textarea>
          </label>
          <p class="session-notes-help">Notes help you understand results later.</p>
        </section>
        <section class="session-images-section" aria-labelledby="detail-session-images-label">
          <div class="session-images-heading">
            <div>
              <p class="eyebrow">Images</p>
              <h4 id="detail-session-images-label">Session Images</h4>
            </div>
            <span class="session-images-limit">Up to 3 images</span>
          </div>
          <label class="session-images-upload">
            <span>Add images</span>
            <span class="file-upload-control">
              <span class="file-upload-button">Choose Image</span>
              <span class="file-upload-name">No file selected</span>
              <input id="detail-session-images-input" class="file-upload-input" type="file" accept="image/*" multiple>
            </span>
          </label>
          <p id="detail-session-images-message" class="session-images-message" aria-live="polite"></p>
          <div id="detail-session-images-grid" class="session-images-grid"></div>
        </section>
        <section id="detail-share-snapshot-section" class="share-snapshot-section" aria-labelledby="detail-share-snapshot-title">
          <div class="snapshot-hero">
            <div class="snapshot-social-icon snapshot-social-icon--hero" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M12 16V4"></path>
                <path d="M7.5 8.5L12 4l4.5 4.5"></path>
                <path d="M6 13.5v3.25A2.25 2.25 0 0 0 8.25 19h7.5A2.25 2.25 0 0 0 18 16.75V13.5"></path>
              </svg>
            </div>
            <div class="snapshot-hero-copy">
              <div class="progress-chart-heading">
                <p class="eyebrow">Share</p>
                <h4 id="detail-share-snapshot-title">Share Your Grow Snapshot</h4>
              </div>
              <p class="snapshot-help">Turn your session into a shareable snapshot</p>
            </div>
          </div>
          <div id="detail-snapshot-image-picker" class="snapshot-source-summary"></div>
          <div class="snapshot-gallery-controls">
            <p class="snapshot-destination-label">Share to</p>
            <div class="snapshot-destination-group" role="radiogroup" aria-label="Snapshot share destination">
              <label class="snapshot-destination-option">
                <input id="detail-snapshot-destination-social" type="radio" name="detail-snapshot-destination" value="social" checked>
                <span>Social only</span>
              </label>
              <label class="snapshot-destination-option">
                <input id="detail-snapshot-destination-social-gallery" type="radio" name="detail-snapshot-destination" value="social-gallery">
                <span>Social + Grow Gallery</span>
              </label>
              <label class="snapshot-destination-option">
                <input id="detail-snapshot-destination-gallery" type="radio" name="detail-snapshot-destination" value="gallery">
                <span>Grow Gallery only</span>
              </label>
            </div>
            <p class="snapshot-destination-info">Grow Gallery snapshots must be approved before being published.</p>
            <p id="detail-snapshot-gallery-note" class="snapshot-gallery-note">Snapshots stay private by default. Publish only if you want this session shown in the Grow Gallery. Private notes stay private.</p>
            <div class="snapshot-gallery-actions">
              <a class="button button-secondary snapshot-gallery-link" href="#gallery">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M7 17 17 7"></path>
                  <path d="M9 7h8v8"></path>
                </svg>
                <span>Visit Grow Gallery</span>
              </a>
              <button id="detail-snapshot-unpublish" type="button" class="button button-secondary snapshot-gallery-unpublish" hidden>Remove from Gallery</button>
            </div>
          </div>
          <p id="detail-snapshot-message" class="snapshot-message" aria-live="polite"></p>
          <div class="snapshot-actions">
            <button id="detail-generate-snapshot" type="button" class="button button-secondary">Generate Snapshot</button>
            <button id="detail-download-snapshot" type="button" class="button button-secondary" disabled>Download Image</button>
            <button id="detail-reset-snapshot" type="button" class="button button-secondary" disabled>Create New Snapshot</button>
            <button id="detail-share-snapshot" type="button" class="button button-primary snapshot-share-button" disabled>
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M12 16V4"></path>
                <path d="M7.5 8.5L12 4l4.5 4.5"></path>
                <path d="M6 13.5v3.25A2.25 2.25 0 0 0 8.25 19h7.5A2.25 2.25 0 0 0 18 16.75V13.5"></path>
              </svg>
              <span>Share</span>
            </button>
          </div>
          <div id="detail-snapshot-preview" class="snapshot-preview" hidden></div>
        </section>
        <p id="detail-save-message" class="form-message" role="alert" aria-live="polite"></p>
        <div class="form-actions">
          <button id="detail-save-session" type="button" class="button button-primary">Save Session</button>
          <a class="button button-secondary" href="#sessions">Back</a>
        </div>
      </section>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
