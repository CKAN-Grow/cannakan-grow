<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannakan® Grow</title>
  <meta name="application-name" content="Cannakan® Grow">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#94d159">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grow">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <script>
    (function () {
      var themeKey = "cannakan-grow-theme";
      var savedTheme = "dark";
      try {
        var storedTheme = localStorage.getItem(themeKey);
        if (storedTheme === "light" || storedTheme === "dark") {
          savedTheme = storedTheme;
        }
      } catch (error) {}
      document.documentElement.dataset.theme = savedTheme;
      document.documentElement.classList.toggle("theme-dark", savedTheme === "dark");
      document.documentElement.style.colorScheme = savedTheme;
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <script>
    (function () {
      var theme = document.documentElement.dataset.theme === "light" ? "light" : "dark";
      document.body.dataset.theme = theme;
      document.body.classList.toggle("theme-dark", theme === "dark");
      document.body.style.colorScheme = theme;
    })();
  </script>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <p class="eyebrow">Grow Session Tracker</p>
        <div class="app-logo-wrap" aria-label="Cannakan® Grow">
          <img class="app-logo app-logo--light" src="src/assets/Cannakan_GROW_lightmode.png" alt="Cannakan® Grow">
          <img class="app-logo app-logo--dark" src="src/assets/Cannakan_GROW_darkmode.png" alt="Cannakan® Grow">
        </div>
      </div>
      <nav class="topbar-nav" aria-label="Primary">
        <a href="#home">Home</a>
        <a href="#sessions">Sessions</a>
        <a href="#gallery">Community Grow</a>
        <a href="#network" data-network-nav hidden>Grow Network</a>
        <a href="#admin" data-admin-nav hidden>Admin</a>
      </nav>
      <div class="topbar-controls">
        <div id="auth-status" class="auth-status"></div>
        <button
          id="mobile-nav-toggle"
          class="mobile-nav-toggle"
          type="button"
          aria-label="Open navigation menu"
          aria-expanded="false"
          aria-controls="mobile-nav-drawer"
        >
          <span class="mobile-nav-toggle-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M4 7h16M4 12h16M4 17h16"></path>
            </svg>
          </span>
        </button>
      </div>
    </header>
    <div id="mobile-nav-drawer" class="mobile-nav-drawer" hidden>
      <div class="mobile-nav-backdrop" data-mobile-nav-close="true"></div>
      <aside class="mobile-nav-panel" aria-label="Mobile navigation">
        <div class="mobile-nav-panel-header">
          <div>
            <p class="eyebrow">Navigation</p>
            <h2>Menu</h2>
          </div>
          <button type="button" class="mobile-nav-close" aria-label="Close navigation menu" data-mobile-nav-close="true">×</button>
        </div>
        <div id="mobile-nav-content" class="mobile-nav-content"></div>
      </aside>
    </div>

    <main id="app" class="app-main"></main>

    <footer class="app-footer" aria-label="Site footer">
      <div class="app-footer-copy">
        <p>© 2026 Cannakan® / CKAN LLC. All rights reserved.</p>
        <p>KAN® System | W.O.W.® 3 Needs for Seeds</p>
        <p class="app-footer-tagline">Built for precision germination tracking.</p>
      </div>
      <nav class="app-footer-nav" aria-label="Footer">
        <a href="#home">Home</a>
        <a href="#sessions">Sessions</a>
        <a href="#gallery">Community Grow</a>
      </nav>
      <div class="app-footer-actions">
        <button type="button" class="button button-secondary app-footer-contact-button" data-contact-admin-open="true" data-contact-admin-type="Other">Report / Contact Admin</button>
      </div>
    </footer>
  </div>

  <template id="auth-template">
    <section class="card auth-card">
      <div>
        <p class="eyebrow">Secure Access</p>
        <h2>Sign in to your grow sessions</h2>
        <p class="muted">Use your email and password to save and manage sessions across devices.</p>
      </div>
      <form id="auth-form" class="auth-form">
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter password" minlength="6" required>
        </label>
        <div class="auth-helper-row">
          <button type="button" class="auth-forgot-link" data-auth-forgot-password="true">Forgot password?</button>
        </div>
        <label id="confirm-password-field" class="auth-confirm-field" hidden>
          <span>Confirm Password</span>
          <input type="password" name="confirmPassword" placeholder="Confirm password" minlength="6">
        </label>
        <p id="auth-message" class="form-message" role="alert" aria-live="polite"></p>
        <div class="form-actions">
          <button type="submit" name="action" value="login" class="button button-primary">Log In</button>
          <button type="submit" name="action" value="signup" class="button button-secondary">Sign Up</button>
        </div>
      </form>
    </section>
  </template>

  <template id="auth-reset-template">
    <section class="card auth-card">
      <div>
        <p class="eyebrow">Secure Access</p>
        <h2>Reset Password</h2>
        <p class="muted">Choose a new password for your Cannakan Grow account.</p>
      </div>
      <form id="auth-reset-form" class="auth-form">
        <label>
          <span>New Password</span>
          <input type="password" name="newPassword" placeholder="Enter new password" minlength="8" required>
        </label>
        <label>
          <span>Confirm New Password</span>
          <input type="password" name="confirmNewPassword" placeholder="Confirm new password" minlength="8" required>
        </label>
        <p id="auth-reset-message" class="form-message" role="alert" aria-live="polite"></p>
        <div class="form-actions">
          <button type="submit" class="button button-primary">Update Password</button>
        </div>
      </form>
    </section>
  </template>

  <template id="setup-template">
    <section class="card auth-card">
      <div>
        <p class="eyebrow">Supabase Setup</p>
        <h2>Connect cloud auth and storage</h2>
        <p class="muted">Add your Supabase project URL and publishable anon key, then run the provided SQL schema so Cannakan Grow can save sessions securely for each user.</p>
      </div>
      <div class="setup-list">
        <p><strong>1.</strong> For Vercel, set <code>CANNAKAN_SUPABASE_URL</code> and <code>CANNAKAN_SUPABASE_ANON_KEY</code>. For local testing, generate or update <code>supabase-config.js</code>.</p>
        <p><strong>2.</strong> Run <code>supabase-schema.sql</code> in the Supabase SQL editor to create the session table and image storage policies.</p>
        <p><strong>3.</strong> Enable Email auth in your Supabase project.</p>
        <p><strong>4.</strong> To make yourself an admin for Community Grow moderation, add your Supabase auth <code>user_id</code> and email to <code>admin_users</code>.</p>
      </div>
    </section>
  </template>

  <template id="profile-template">
    <section class="card auth-card profile-card">
      <div>
        <p id="profile-eyebrow" class="eyebrow">Profile Setup</p>
        <h2 id="profile-title">Set up your profile</h2>
        <p id="profile-copy" class="muted">Choose the username you want Cannakan Grow to show in the app.</p>
      </div>
      <form id="profile-form" class="auth-form profile-form">
        <label>
          <span>Username / Display Name</span>
          <input type="text" name="username" placeholder="Choose a display name" maxlength="40" required>
        </label>
        <label class="profile-avatar-field">
          <span>Profile Picture (optional)</span>
          <span class="file-upload-control">
            <span class="file-upload-button">Choose Image</span>
            <span class="file-upload-name">No file selected</span>
            <input class="file-upload-input" type="file" name="avatar" accept="image/*">
          </span>
        </label>
        <div id="profile-avatar-preview" class="profile-avatar-preview" hidden></div>
        <div class="profile-avatar-actions">
          <button id="profile-remove-avatar" type="button" class="button button-secondary" hidden>Remove Picture</button>
        </div>
        <section class="profile-preferences" aria-labelledby="profile-preferences-title">
          <div>
            <p class="eyebrow">Preferences</p>
            <h3 id="profile-preferences-title">Notifications</h3>
            <p class="muted">Choose which account alerts Cannakan Grow should use for your profile as notification delivery rolls out.</p>
            <p id="profile-preferences-default-note" class="profile-preferences-helper muted" hidden>Notification preferences are using defaults until preferences are enabled.</p>
          </div>
          <div class="profile-preferences-list">
            <label class="profile-preference-toggle">
              <input type="checkbox" name="notifyEmail">
              <span class="profile-preference-toggle-control" aria-hidden="true"></span>
              <span class="profile-preference-toggle-text">
                <span class="profile-preference-toggle-copy">Email notifications</span>
                <span class="profile-preference-toggle-detail">General account email alerts when notification delivery is enabled.</span>
              </span>
            </label>
            <label class="profile-preference-toggle">
              <input type="checkbox" name="notifyPush">
              <span class="profile-preference-toggle-control" aria-hidden="true"></span>
              <span class="profile-preference-toggle-text">
                <span class="profile-preference-toggle-copy">Push notifications</span>
                <span class="profile-preference-toggle-detail">Browser or device alert preferences for future push notification support.</span>
              </span>
            </label>
            <label class="profile-preference-toggle">
              <input type="checkbox" name="notifyFollow">
              <span class="profile-preference-toggle-control" aria-hidden="true"></span>
              <span class="profile-preference-toggle-text">
                <span class="profile-preference-toggle-copy">Follow notifications</span>
                <span class="profile-preference-toggle-detail">Get notified when someone follows your public grow profile.</span>
              </span>
            </label>
            <label class="profile-preference-toggle">
              <input type="checkbox" name="notifyLike">
              <span class="profile-preference-toggle-control" aria-hidden="true"></span>
              <span class="profile-preference-toggle-text">
                <span class="profile-preference-toggle-copy">Like notifications</span>
                <span class="profile-preference-toggle-detail">Get notified when someone likes your shared Community Grow snapshot.</span>
              </span>
            </label>
          </div>
        </section>
        <p id="profile-message" class="form-message" role="alert" aria-live="polite"></p>
        <div class="form-actions">
          <button id="profile-submit" type="submit" class="button button-primary">Save Profile</button>
        </div>
        <section class="profile-danger-zone" aria-labelledby="profile-danger-title">
          <div>
            <p class="eyebrow">Danger Zone</p>
            <h3 id="profile-danger-title">Delete Account</h3>
            <p class="muted">Schedule deletion of your Cannakan Grow profile, sessions, and uploaded images with a 7-day recovery window.</p>
          </div>
          <button id="profile-delete-account" type="button" class="button button-danger">Delete Account</button>
        </section>
      </form>
    </section>
  </template>

  <template id="home-template">

      <section class="dashboard-bar card app-section-header">
        <div class="section-title-with-icon app-section-header-main">
          <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <g transform="translate(12 12) scale(1.28) translate(-12 -12)">
              <path d="M12 18.5v-4.5"></path>
              <path d="M12 14.5c0-3 1.9-5.5 4.5-6.7-.2 3.2-1.7 5.6-4.5 6.7Z"></path>
              <path d="M12 13.5c-2.6-1-4.1-3.4-4.3-6.4 2.5 1.1 4.3 3.5 4.3 6.4Z"></path>
              <path d="M9.6 18.9c.4-1.8 1.6-3 2.9-3s2.4 1.2 2.8 3"></path>
              <path d="M10.1 21h4.2"></path>
            </g>
          </svg>
          <div>
            <p class="eyebrow">Session Dashboard</p>
            <h2>Grow sessions</h2>
            <p class="dashboard-subtitle">Track what is active, what is performing best, and what needs your attention next.</p>
          </div>
        </div>
        <div class="hero-actions">
          <a class="button button-new-session" href="#new" data-session-entry="true">New Session</a>
          <a class="button button-secondary" href="#sessions">All Sessions</a>
        </div>
      </section>

      <section id="active-session-spotlight" class="card spotlight-card" aria-labelledby="active-session-spotlight-title">
        <div class="spotlight-head app-section-header">
          <div class="section-title-with-icon app-section-header-main">
            <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M4.5 14h3l2.2-4 3.1 8 2.2-5H19.5"></path>
              <path d="M4.5 19.5h15"></path>
              <path d="M7.5 6.5h9"></path>
            </svg>
            <div>
              <p class="eyebrow">Active Session</p>
              <h3 id="active-session-spotlight-title">Active Session Spotlight</h3>
            </div>
          </div>
          <span id="active-session-spotlight-stage" class="spotlight-stage-pill">Soaking</span>
        </div>
        <div class="spotlight-body">
          <div class="spotlight-main">
            <strong id="active-session-spotlight-name" class="spotlight-name">No active sessions</strong>
            <p id="active-session-spotlight-date" class="spotlight-date"></p>
            <p id="active-session-spotlight-description" class="spotlight-description"></p>
            <div class="spotlight-meta">
              <article class="spotlight-stat">
                <span>Stage Timer</span>
                <strong id="active-session-spotlight-timer">0 minutes</strong>
              </article>
              <article class="spotlight-stat">
                <span>Seeds Progress</span>
                <strong id="active-session-spotlight-seeds">0 / 0</strong>
              </article>
              <article class="spotlight-stat">
                <span>Germination</span>
                <strong id="active-session-spotlight-rate">0%</strong>
              </article>
            </div>
          </div>
          <div class="spotlight-actions">
            <a id="active-session-spotlight-action" class="button button-primary" href="#new" data-session-entry="true">Start New Session</a>
          </div>
        </div>
      </section>

      <section class="summary-grid">
        <a id="active-sessions-card" class="card stat-card summary-link-card card-accent card-accent-blue" href="#sessions">
          <span class="stat-label">Active Sessions</span>
          <strong id="active-session-count" class="stat-value">0</strong>
          <p id="active-session-subtext" class="summary-subtext">in progress</p>
        </a>
        <a id="saved-sessions-card" class="card stat-card summary-link-card card-accent card-accent-orange" href="#sessions">
          <span class="stat-label">Saved Sessions</span>
          <strong id="session-count" class="stat-value">0</strong>
          <p class="summary-subtext">total saved</p>
        </a>
        <a id="best-session-card" class="card stat-card best-session-card summary-link-card card-accent card-accent-green" href="#sessions">
          <div class="best-session-header">
            <span class="stat-label">Best Session</span>
            <span class="best-session-indicator">Best</span>
          </div>
          <strong id="best-session-name" class="best-session-name">No completed sessions yet</strong>
          <p id="best-session-date" class="summary-subtext"></p>
          <p id="best-session-result" class="best-session-result"></p>
        </a>
        <article class="card stat-card overall-rate-card card-accent card-accent-brown">
          <span class="stat-label">All Sessions Germination Rate</span>
          <strong id="overall-germination-rate" class="overall-rate-value">0%</strong>
          <p id="overall-germination-total" class="overall-rate-total">0 / 0 seeds</p>
          <div class="overall-rate-bar" aria-label="Overall germination rate">
            <div id="overall-germination-fill" class="overall-rate-fill"></div>
          </div>
        </article>
      </section>

      <div id="home-dashboard-message-board-anchor"></div>
    </div>
  </template>

  <template id="gallery-template">
    <section class="card gallery-hero-section">
      <div class="section-heading app-section-header">
        <div class="section-title-with-icon app-section-header-main">
          <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M21 3 10 14"></path>
            <path d="m21 3-7 18-4-7-7-4 18-7Z"></path>
          </svg>
          <div>
            <p class="eyebrow">Community Grow</p>
            <h2>Community Grow</h2>
            <p class="muted">Explore shared grow sessions in Community Grow</p>
          </div>
        </div>
        <div class="inline-actions">
          <button type="button" class="button button-secondary" data-contact-admin-open="true" data-contact-admin-type="Question">Report / Contact Admin</button>
        </div>
      </div>
    </section>

    <section class="card gallery-section gallery-feed-section">
      <div class="section-heading app-section-header">
        <div class="section-title-with-icon app-section-header-main">
          <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <rect x="4" y="6" width="10" height="12" rx="2"></rect>
            <path d="M14 9h4a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-2"></path>
            <path d="m8 14 2-2 2 2"></path>
            <circle cx="10" cy="10" r="1"></circle>
          </svg>
          <div>
            <p class="eyebrow">Published Snapshots</p>
            <h3>Community Grow</h3>
            <p id="gallery-sort-state" class="gallery-sort-state muted">Sorted by: Date · Newest to Oldest</p>
            <p id="gallery-count-state" class="gallery-count-state muted">Showing 0 of 0 snapshots</p>
          </div>
        </div>
        <div class="gallery-sort-controls">
          <label class="session-history-sort-control" for="gallery-sort">
            <span>SORT BY</span>
            <div class="custom-select session-history-sort-select" data-dropdown-key="gallery-sort">
              <select id="gallery-sort" name="gallerySort" class="custom-select-native" data-custom-select="true">
                <option value="date">Date</option>
                <option value="rate">Highest Germination Rate</option>
                <option value="source">Source</option>
                <option value="seed-type">Seed Type</option>
                <option value="profile">Profile</option>
                <option value="likes">Most Likes</option>
              </select>
              <button type="button" class="custom-select-trigger" aria-haspopup="listbox" aria-expanded="false">
                <span class="custom-select-value">Date</span>
                <span class="custom-select-chevron" aria-hidden="true"></span>
              </button>
              <div class="custom-select-menu" role="listbox" hidden></div>
            </div>
          </label>
          <label class="session-history-sort-control" for="gallery-sort-order">
            <span>ORDER</span>
            <div class="custom-select session-history-sort-select" data-dropdown-key="gallery-sort-order">
              <select id="gallery-sort-order" name="gallerySortOrder" class="custom-select-native" data-custom-select="true">
                <option value="desc">Newest to Oldest</option>
                <option value="asc">Oldest to Newest</option>
              </select>
              <button type="button" class="custom-select-trigger" aria-haspopup="listbox" aria-expanded="false">
                <span class="custom-select-value">Newest to Oldest</span>
                <span class="custom-select-chevron" aria-hidden="true"></span>
              </button>
              <div class="custom-select-menu" role="listbox" hidden></div>
            </div>
          </label>
        </div>
      </div>
      <div id="gallery-grid" class="gallery-grid"></div>
      <div id="gallery-load-more-shell" class="gallery-load-more-shell" hidden>
        <button id="gallery-load-more-button" type="button" class="button button-secondary">Load More Snapshots</button>
      </div>
    </section>
  </template>

  <template id="gallery-review-template">
    <section class="card">
      <div class="section-heading app-section-header">
        <div class="section-title-with-icon app-section-header-main">
          <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">

            <p class="muted">Review submitted grow snapshots before they appear in Community Grow.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="card gallery-review-section">
      <div class="section-heading app-section-header">
        <div class="section-title-with-icon app-section-header-main">
          <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <rect x="4" y="6" width="10" height="12" rx="2"></rect>
            <path d="M14 9h4a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-2"></path>
            <path d="m8 14 2-2 2 2"></path>
            <circle cx="10" cy="10" r="1"></circle>

          </div>

      </div>

    </section>

    <section class="card gallery-review-section">
      <div class="section-heading app-section-header">
        <div class="section-title-with-icon app-section-header-main">
          <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <rect x="4" y="6" width="10" height="12" rx="2"></rect>
            <path d="M14 9h4a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-2"></path>
            <path d="m8 14 2-2 2 2"></path>
            <circle cx="10" cy="10" r="1"></circle>

          <div>
            <p class="eyebrow">Approved</p>

          </div>
        </div>
      </div>
      <div id="gallery-review-approved-list" class="gallery-review-list"></div>
    </section>
  </template>

  <template id="session-form-template">
    <section class="card">
      <div class="section-heading app-section-header">
        <div class="section-title-with-icon app-section-header-main">

        <section id="detail-progress-section" class="progress-chart-section" aria-labelledby="detail-progress-title">
          <div class="progress-chart-heading">
            <p class="eyebrow">Progress</p>
            <h4 id="detail-progress-title" class="section-title-with-icon">
              <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M6 18V10"></path>
                <path d="M12 18V6"></path>
                <path d="M18 18v-4"></path>
              </svg>
              <span>Germination progress by partition</span>
            </h4>
          </div>
          <div id="detail-progress-chart" class="progress-chart-list"></div>
        </section>
        <section id="detail-run-progress-section" class="run-progress-section" aria-labelledby="detail-run-progress-title">
          <div class="progress-chart-heading">
            <p class="eyebrow">Germination Rate</p>
            <h4 id="detail-run-progress-title" class="section-title-with-icon">
              <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M5 16l4-4 3 3 6-7"></path>
                <path d="M15 8h3v3"></path>
              </svg>
              <span>Overall Session Germination %</span>
            </h4>
          </div>
          <div id="detail-run-progress-summary" class="run-progress-summary"></div>
        </section>
        <section class="session-notes-section" aria-labelledby="detail-session-notes-label">
          <label class="session-notes-field" for="detail-session-notes">
            <p class="eyebrow">Notes</p>
            <span id="detail-session-notes-label" class="section-title-with-icon">
              <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M7 5.5h7l3 3V18.5a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 6 18.5v-11A2 2 0 0 1 8 5.5"></path>
                <path d="M14 5.5v3h3"></path>
                <path d="M9 12h6"></path>
                <path d="M9 15h4"></path>
              </svg>
              <span>Session Notes</span>
            </span>
            <textarea
              id="detail-session-notes"
              rows="5"
              placeholder="Add notes about this run (soak time, conditions, observations...)"
            ></textarea>
          </label>
          <p class="session-notes-help">Notes help you understand results later.</p>
          <div class="session-notes-actions">
            <button id="detail-session-notes-save" type="button" class="button button-secondary">Save Note</button>
            <p id="detail-session-notes-message" class="session-notes-message" aria-live="polite"></p>
          </div>
        </section>
        <section class="session-images-section" aria-labelledby="detail-session-images-label">
          <div class="session-images-heading">
            <div>
              <p class="eyebrow">Images</p>
              <h4 id="detail-session-images-label" class="section-title-with-icon">
                <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <rect x="4" y="6" width="16" height="12" rx="2"></rect>
                  <circle cx="9" cy="10" r="1.5"></circle>
                  <path d="m20 15-4.5-4.5L8 18"></path>
                </svg>
                <span>Session Images</span>
              </h4>
            </div>
            <span class="session-images-limit">Up to 3 images</span>
          </div>
          <label class="session-images-upload">
            <span>Add images</span>
            <span class="file-upload-control">
              <span class="file-upload-button">Choose Image</span>
              <span class="file-upload-name">No file selected</span>
              <input id="detail-session-images-input" class="file-upload-input" type="file" accept="image/*" multiple>
            </span>
          </label>
          <p id="detail-session-images-message" class="session-images-message" aria-live="polite"></p>
          <div id="detail-session-images-grid" class="session-images-grid"></div>
        </section>
        <section id="detail-share-snapshot-section" class="share-snapshot-section" aria-labelledby="detail-share-snapshot-title">
          <div class="snapshot-hero">
            <div class="snapshot-hero-copy">
              <div class="progress-chart-heading">
                <p class="eyebrow">Share</p>
                <h4 id="detail-share-snapshot-title" class="section-title-with-icon">
                  <svg class="section-title-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M12 16V4"></path>
                    <path d="M7.5 8.5L12 4l4.5 4.5"></path>
                    <path d="M6 13.5v3.25A2.25 2.25 0 0 0 8.25 19h7.5A2.25 2.25 0 0 0 18 16.75V13.5"></path>
                  </svg>
                  <span>Share Your Grow Snapshot</span>
                </h4>
              </div>
              <p class="snapshot-help">Turn your session into a shareable snapshot</p>
            </div>
          </div>
          <div class="snapshot-gallery-controls">
            <p class="snapshot-destination-label">Share to</p>
            <div class="snapshot-destination-group" role="radiogroup" aria-label="Snapshot share destination">
              <label class="snapshot-destination-option">
                <input id="detail-snapshot-destination-social" type="radio" name="detail-snapshot-destination" value="social" checked>
                <span>Social only</span>
              </label>
              <label class="snapshot-destination-option">
                <input id="detail-snapshot-destination-social-gallery" type="radio" name="detail-snapshot-destination" value="social-gallery">
                <span>Social + Community Grow</span>
              </label>
              <label class="snapshot-destination-option">
                <input id="detail-snapshot-destination-gallery" type="radio" name="detail-snapshot-destination" value="gallery">
                <span>Community Grow only</span>
              </label>
            </div>
            <label id="detail-snapshot-profile-toggle-row" class="snapshot-profile-toggle" hidden>
              <input id="detail-snapshot-include-profile" type="checkbox" name="detail-snapshot-include-profile">
              <span class="snapshot-profile-toggle-control" aria-hidden="true"></span>
              <span class="snapshot-profile-toggle-text">
                <span class="snapshot-profile-toggle-copy">Include my profile name &amp; image with this snapshot in Community Grow</span>
                <span class="snapshot-profile-toggle-helper">Only your profile name and image will be shown.</span>
              </span>
            </label>
            <div id="detail-snapshot-profile-divider-row" class="snapshot-profile-divider" hidden aria-hidden="true"></div>
            <p class="snapshot-destination-info">Community Grow snapshots must be approved before being published.</p>
            <p id="detail-snapshot-gallery-note" class="snapshot-gallery-note">Snapshots stay private by default. Publish only if you want this session shown in Community Grow. Private notes stay private.</p>
          </div>
          <div id="detail-snapshot-preview" class="snapshot-preview" hidden></div>
          <div class="snapshot-actions">
            <div class="snapshot-action-row">
              <span class="snapshot-action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <rect x="4" y="7" width="16" height="12" rx="2.5"></rect>
                  <path d="M9 7 10.4 5h3.2L15 7"></path>
                  <circle cx="12" cy="13" r="3"></circle>
                </svg>
              </span>
              <div class="snapshot-action-copy">
                <h5 class="snapshot-action-title">Generate a New Snapshot</h5>
                <p class="snapshot-action-description">Capture a new snapshot for this session.</p>
                <div id="detail-snapshot-image-picker" class="snapshot-source-summary"></div>
              </div>
              <button id="detail-generate-snapshot" type="button" class="button button-secondary snapshot-generate-button snapshot-primary-action-button">Generate Snapshot</button>
            </div>
          </div>
          <p id="detail-snapshot-message" class="snapshot-message" aria-live="polite"></p>
          <div id="detail-snapshot-post-actions" class="snapshot-share-row snapshot-post-actions" hidden>
            <div class="snapshot-consent-block" aria-live="polite">
              <p class="snapshot-consent-disclaimer">By submitting this snapshot, you grant Cannakan® / CKAN LLC permission to use and share your images for promotional purposes, including social media.</p>
              <label class="snapshot-consent-label">
                <input id="detail-snapshot-usage-consent" type="checkbox" name="detail-snapshot-usage-consent">
                <span>I agree to the usage terms</span>
              </label>
            </div>
            <button id="detail-share-snapshot" type="button" class="button button-primary snapshot-share-button snapshot-primary-action-button" disabled>
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M12 16V4"></path>
                <path d="M7.5 8.5L12 4l4.5 4.5"></path>
                <path d="M6 13.5v3.25A2.25 2.25 0 0 0 8.25 19h7.5A2.25 2.25 0 0 0 18 16.75V13.5"></path>
              </svg>
              <span>Share</span>
            </button>
            <button id="detail-download-snapshot" type="button" class="button button-secondary" disabled>Download Image</button>
            <button id="detail-reset-snapshot" type="button" class="button button-secondary" disabled>Create New Snapshot</button>
          </div>
        </section>
        <p id="detail-save-message" class="form-message" role="alert" aria-live="polite"></p>
        <div class="form-actions">
          <button id="detail-save-session" type="button" class="button button-primary">Save Session</button>
          <a class="button button-secondary" href="#sessions">Back</a>
        </div>
      </section>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
